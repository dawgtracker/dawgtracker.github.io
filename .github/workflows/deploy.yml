name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Fetch Odds Data"]
    types:
      - completed
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Fetch odds
        run: |
          curl "https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds?apiKey=${{ secrets.REACT_APP_API_KEY }}&regions=us&markets=h2h,spreads&oddsFormat=american" -o public/odds.json
          curl "https://api.the-odds-api.com/v4/sports/basketball_ncaab/scores?apiKey=${{ secrets.REACT_APP_API_KEY }}&daysFrom=1" -o public/scores.json
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          REACT_APP_API_KEY: ${{ secrets.REACT_APP_API_KEY }}
          CI: false
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
