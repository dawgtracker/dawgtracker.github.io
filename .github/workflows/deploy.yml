name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Fetch Odds Data"]
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * *'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Fetch odds
        run: |
          curl "https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds?apiKey=${{ secrets.REACT_APP_API_KEY }}&regions=us&markets=h2h,spreads&oddsFormat=american" -o public/odds_live.json
          curl "https://api.the-odds-api.com/v4/sports/basketball_ncaab/scores?apiKey=${{ secrets.REACT_APP_API_KEY }}&daysFrom=3" -o public/scores_live.json
          node -e "
            const fs = require('fs');
            const live = JSON.parse(fs.readFileSync('./public/odds_live.json'));
            const manual = JSON.parse(fs.readFileSync('./public/odds_manual.json'));
            const liveIds = new Set(live.map(g => g.id));
            const merged = [...manual.filter(g => !liveIds.has(g.id)), ...live];
            fs.writeFileSync('./public/odds.json', JSON.stringify(merged));

            const oddsMap = {};
            [...live, ...manual].forEach(g => {
              const bk = g.bookmakers?.find(b => b.key === 'draftkings');
              if (!bk) return;
              const h2h = bk.markets?.find(m => m.key === 'h2h');
              if (!h2h) return;
              const homeOdds = h2h.outcomes.find(o => o.name === g.home_team)?.price;
              const awayOdds = h2h.outcomes.find(o => o.name === g.away_team)?.price;
              if (homeOdds && awayOdds) {
                oddsMap[g.id] = {
                  underdog: homeOdds > awayOdds ? g.home_team : g.away_team,
                  underdogOdds: homeOdds > awayOdds ? homeOdds : awayOdds,
                  favorite: homeOdds > awayOdds ? g.away_team : g.home_team,
                  favoriteOdds: homeOdds > awayOdds ? awayOdds : homeOdds,
                };
              }
            });

            const newScores = JSON.parse(fs.readFileSync('./public/scores_live.json'));
            let existingScores = [];
            try { existingScores = JSON.parse(fs.readFileSync('./public/scores.json')); } catch(e) {}
            const existingMap = {};
            existingScores.forEach(g => existingMap[g.id] = g);

            const updatedScores = newScores.map(g => ({
              ...g,
              ...(oddsMap[g.id] || (existingMap[g.id]?.underdogOdds ? {
                underdog: existingMap[g.id].underdog,
                underdogOdds: existingMap[g.id].underdogOdds,
                favorite: existingMap[g.id].favorite,
                favoriteOdds: existingMap[g.id].favoriteOdds,
              } : {}))
            }));

            existingScores.forEach(g => {
              if (!updatedScores.find(s => s.id === g.id)) updatedScores.push(g);
            });

            fs.writeFileSync('./public/scores.json', JSON.stringify(updatedScores));
          "
      - name: Commit JSON files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f public/odds.json public/scores.json
          git diff --staged --quiet || git commit -m "Update odds and scores data"
          git push
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          REACT_APP_API_KEY: ${{ secrets.REACT_APP_API_KEY }}
          CI: false
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
