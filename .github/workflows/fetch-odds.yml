name: Fetch Odds Data

on:
  schedule:
    - cron: '30 5 * * *'   # 1:30 AM EDT
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch odds
        run: |
          curl "https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds?apiKey=${{ secrets.REACT_APP_API_KEY }}&regions=us&markets=h2h,spreads&oddsFormat=american" \
          -o public/odds.json

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/odds.json
          git diff --staged --quiet || git commit -m "Update odds data"
          git push
